<html lang="pt-BR">

    <title>Museu Interativo: Raízes Negras e a Identidade Paranaense</title>

        :root {
            --cor-fundo: #f4f1ea;
            --cor-texto: #2c2523;

        body {

            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--cor-primaria);
            color: white;

            padding: 3rem 1rem;

            font-size: 2.5rem;

            color: var(--cor-detalhe);
        }

            background-color: var(--cor-texto);

            justify-content: center;
            padding: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--cor-detalhe);
        }

        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

            transition: transform 0.2s;
        }

        .secao-museu:hover {
            transform: translateY(-2px);
        }
